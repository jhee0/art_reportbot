name: validation-check

on:
  schedule:
    # 한국시간 평일 오후 4:30 (UTC 07:30) → 트래픽 회피
    - cron: '23 7 * * 1-5'   # 월-금 KST 16:23 1차
    # 한국시간 평일 오후 7:00 (UTC 10:00) → 트래픽 회피  
    - cron: '47 9 * * 1-5'   # 월-금 KST 18:47 2차
    # 한국시간 평일 저녁 10:00 (UTC 13:00) → 트래픽 회피
    - cron: '17 13 * * 1-5'  # 월-금 KST 22:17 3차
  
  # 수동 실행도 가능하게
  workflow_dispatch:

jobs:
  validation-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pandas python-dotenv slack-sdk selenium

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
        
    - name: Run validation check
      env:
        TASKWORLD_EMAIL: ${{ secrets.TASKWORLD_EMAIL }}
        TASKWORLD_PASSWORD: ${{ secrets.TASKWORLD_PASSWORD }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        SLACK_CHANNEL_VALIDATION: ${{ secrets.SLACK_CHANNEL_VALIDATION }}
      run: |
        python selenium_taskworld_downloader.py validation
        
    - name: Upload logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: validation-error-logs
        path: |
          *.log
