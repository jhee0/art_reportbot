name: validation-check

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 월-금 KST 16:00
    - cron: '0 10 * * 1-5'  # 월-금 KST 19:00
    - cron: '0 13 * * 1-5'  # 월-금 KST 22:00
  
  # 수동 실행도 가능하게
  workflow_dispatch:

jobs:
  validation-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pandas python-dotenv slack-sdk selenium

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
        
    - name: Run validation check
      env:
        TU_EMAIL: ${{ secrets.TU_EMAIL }}
        TU_PASSWORD: ${{ secrets.TU_PASSWORD }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        SLACK_CHANNEL_VALIDATION: ${{ secrets.SLACK_CHANNEL_VALIDATION }}
        TZ: Asia/Seoul
      run: |
        python tu_downloader.py validation
        
    - name: Upload logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: validation-error-logs
        path: |
          *.log
